# ========================================
# Application Configuration
# ========================================
spring.application.name=springbash

# ========================================
# Server Configuration
# ========================================
server.port=8081
server.servlet.context-path=/
server.error.include-message=always
server.error.include-binding-errors=always

# ========================================
# Database Configuration - H2
# ========================================
spring.datasource.url=jdbc:h2:mem:springbashdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ========================================
# JPA Configuration
# ========================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ========================================
# H2 Console
# ========================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.trace=false
spring.h2.console.settings.web-allow-others=false

# ========================================
# Actuator / Monitoring
# ========================================
management.endpoints.web.exposure.include=health,info,metrics,env,beans
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true

# ========================================
# Logging Configuration
# ========================================
logging.level.com.example.springbash=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.file.name=logs/application.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n

# ========================================
# Application Custom Properties
# ========================================
app.name=SpringBash
app.version=1.0.0
app.environment=development
app.description=Application Spring Boot avec scripts d'administration